name: Rust Build

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'src/**'
      - 'tests/**'
      - '**.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'src/**'
      - 'tests/**'
      - '**.yml'

jobs:
  rust-build:
    name: Rust on ${{ matrix.name }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            name: Linux 64-Bit

          - os: macos-latest
            name: MacOS 64-Bit

          - os: windows-latest
            name: Windows 64-Bit

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Store or retrieve cargo caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build library with language subset
        run: cargo build --locked --no-default-features --features german

      - name: Build and test library
        run: cargo test --locked

      - name: Build and test binary
        run: cargo test --locked --bin accuracy_reports --features accuracy-reports

      - name: Check Clippy lints in library
        run: cargo clippy -- -Dwarnings

      - name: Check Clippy lints in binary
        run: cargo clippy --bin accuracy_reports --features accuracy-reports -- -Dwarnings

  wasm-build:
    name: WASM Build
    needs: rust-build

    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # 6️⃣ 编译 Rust → WASM
      - name: Build project as WASM
        run: wasm-pack build --release --target web

      # 7️⃣ 上传生成的 wasm
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v3
        with:
          name: wasm-output
          path: pkg/*.wasm
